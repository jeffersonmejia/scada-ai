<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scada IA</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=1" />
    <link rel="stylesheet" href="/styles.css?v=19" />
  </head>
  <body>
    <div class="liquid liquidOne"></div>
    <div class="liquid liquidTwo"></div>
    <main class="shell">
      <section class="chatSurface">
        <section class="chatPanel">
          <section id="messages" class="messages" aria-live="polite">
            <section id="emptyState" class="emptyState">
              <img class="emptyIllustration" src="/assets/1.svg?v=2" alt="" aria-hidden="true" />
              <h2>What do you want to check today?</h2>
              <p id="emptyPrompt">Detect malicious code instructions</p>
            </section>
          </section>

          <form id="chatForm" class="composer">
            <textarea id="prompt" name="prompt" rows="1" placeholder="Write your message..." autofocus></textarea>
            <button id="sendButton" class="sendButton" type="submit" title="Send" aria-label="Send">
              <ion-icon name="arrow-up-outline" class="buttonIcon" aria-hidden="true"></ion-icon>
            </button>
          </form>
        </section>

        <aside class="metricsPanel" aria-label="Classification metrics">
          <header class="panelNav">
            <div class="brandMark">
              <span class="musicGlyph">
                <ion-icon name="hardware-chip-outline" class="brandIcon" aria-hidden="true"></ion-icon>
              </span>
              <h1>Scada IA</h1>
            </div>
            <div class="topActions">
              <button id="clearChatButton" class="themeButton clearChatButton" title="Clear chat" aria-label="Clear chat">
                <ion-icon name="trash-outline" class="buttonIcon" aria-hidden="true"></ion-icon>
                <span>Clear chat</span>
              </button>
              <button id="themeButton" class="themeButton" title="Change theme" aria-label="Change theme">
                <ion-icon name="moon-outline" class="buttonIcon" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </header>

          <section class="metricsBox statusBox">
            <div class="connectionBar">
              <span class="connItem">
                <ion-icon id="classifierStatusIcon" name="sync-outline" class="connIcon connUnknown"></ion-icon>
                Classifier <span id="classifierStatusLabel" class="statusLabel">checking…</span>
              </span>
              <span class="connItem">
                <ion-icon id="qwenStatusIcon" name="sync-outline" class="connIcon connUnknown"></ion-icon>
                Qwen <span id="qwenStatusLabel" class="statusLabel">checking…</span>
              </span>
            </div>
          </section>

          <section class="metricsBox">
            <div class="bars" aria-live="polite">
              <div class="barRow">
                <div class="barLabel">
                <span class="barName"><ion-icon name="close-circle-outline" aria-hidden="true"></ion-icon>Not passed</span>
                  <strong id="notPassedPercent">0%</strong>
                </div>
                <div class="barTrack">
                  <span id="notPassedBar" class="barFill notPassedBar"></span>
                </div>
                <span id="notPassedCount" class="barCount">0</span>
              </div>

              <div class="barRow">
                <div class="barLabel">
                <span class="barName"><ion-icon name="checkmark-circle-outline" aria-hidden="true"></ion-icon>Passed</span>
                  <strong id="passedPercent">0%</strong>
                </div>
                <div class="barTrack">
                  <span id="passedBar" class="barFill passedBar"></span>
                </div>
                <span id="passedCount" class="barCount">0</span>
              </div>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <dialog id="clearChatDialog" class="confirmDialog" aria-labelledby="clearChatDialogTitle" aria-describedby="clearChatDialogDescription">
      <div class="confirmDialogContent">
        <div class="confirmDialogIcon" aria-hidden="true">
          <ion-icon name="trash-outline"></ion-icon>
        </div>
        <h2 id="clearChatDialogTitle">Clear this chat?</h2>
        <p id="clearChatDialogDescription">This will permanently remove the current conversation.</p>
        <div class="confirmDialogActions">
          <button id="cancelClearChatButton" class="dialogButton cancelDialogButton" type="button">Cancel</button>
          <button id="confirmClearChatButton" class="dialogButton confirmDialogButton" type="button">Clear chat</button>
        </div>
      </div>
    </dialog>

    <div id="chatToast" class="toast" role="status" aria-live="polite" aria-atomic="true">
      <span class="toastIcon" aria-hidden="true">
        <ion-icon name="checkmark-outline"></ion-icon>
      </span>
      <span>Chat deleted</span>
    </div>

    <script type="module" src="/vendor/ionicons/ionicons.esm.js?v=3"></script>
    <script nomodule src="/vendor/ionicons/ionicons.js?v=3"></script>
    <script>
      if ("EventSource" in window) {
        const liveReload = new EventSource("/__live-reload");
        liveReload.addEventListener("reload", () => window.location.reload());
      }
    </script>
    <script src="/app.js?v=15"></script>
  </body>
</html>
