<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scada IA</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="liquid liquidOne"></div>
    <div class="liquid liquidTwo"></div>
    <main class="shell">
      <header class="topbar">
        <div class="brandMark">
          <span class="musicGlyph">
            <ion-icon name="hardware-chip-outline" class="brandIcon" aria-hidden="true"></ion-icon>
          </span>
          <h1>Scada IA</h1>
        </div>
        <div class="topActions">
          <button id="newChatButton" class="themeButton" title="New chat" aria-label="New chat">
            <ion-icon name="add-outline" class="buttonIcon" aria-hidden="true"></ion-icon>
            <span>New chat</span>
          </button>
          <button id="themeButton" class="themeButton" title="Change theme" aria-label="Change theme">
            <ion-icon name="moon-outline" class="buttonIcon" aria-hidden="true"></ion-icon>
          </button>
        </div>
      </header>
      <section class="chatSurface">
        <section class="chatPanel">
          <section id="messages" class="messages" aria-live="polite">
            <section id="emptyState" class="emptyState">
              <h2>What do you want to check today?</h2>
              <p id="emptyPrompt">Detect malicious code instructions</p>
            </section>
          </section>

          <form id="chatForm" class="composer">
            <textarea id="prompt" name="prompt" rows="1" placeholder="Write your message..." autofocus></textarea>
            <button id="sendButton" class="sendButton" type="submit" title="Send" aria-label="Send">
              <ion-icon name="arrow-up-outline" class="buttonIcon" aria-hidden="true"></ion-icon>
            </button>
          </form>
        </section>

        <aside class="metricsPanel" aria-label="Classification metrics">
          <section class="metricsBox">
            <div class="metricsHeader">
              <span>RoBERTa</span>
              <strong id="metricsTotal">0</strong>
            </div>

            <div class="bars" aria-live="polite">
              <div class="barRow">
                <div class="barLabel">
                <span>Not passed</span>
                  <strong id="notPassedPercent">0%</strong>
                </div>
                <div class="barTrack">
                  <span id="notPassedBar" class="barFill notPassedBar"></span>
                </div>
                <span id="notPassedCount" class="barCount">0</span>
              </div>

              <div class="barRow">
                <div class="barLabel">
                <span>Passed</span>
                  <strong id="passedPercent">0%</strong>
                </div>
                <div class="barTrack">
                  <span id="passedBar" class="barFill passedBar"></span>
                </div>
                <span id="passedCount" class="barCount">0</span>
              </div>
            </div>
          </section>

          <section class="metricsBox scoreBox">
            <div class="truthPanel">
              <span>Ground truth</span>
              <div class="truthActions">
                <button id="truthMalwareButton" class="truthButton" type="button" disabled>Not passed</button>
                <button id="truthCleanButton" class="truthButton" type="button" disabled>Passed</button>
              </div>
            </div>

            <div class="scoreGrid" aria-live="polite">
              <div class="scoreItem">
                <span>Accuracy</span>
                <strong id="accuracyScore">N/A</strong>
              </div>
              <div class="scoreItem">
                <span>Precision</span>
                <strong id="precisionScore">N/A</strong>
              </div>
              <div class="scoreItem">
                <span>Recall</span>
                <strong id="recallScore">N/A</strong>
              </div>
              <div class="scoreItem">
                <span>F1 score</span>
                <strong id="f1Score">N/A</strong>
              </div>
            </div>
          </section>

          <section class="metricsBox connBox">
            <div class="connectionBar">
              <span class="connItem">
                <ion-icon id="robertaStatusIcon" name="sync-outline" class="connIcon connUnknown"></ion-icon>
                RoBERTa <span id="robertaStatusLabel" class="statusLabel">checking…</span>
              </span>
              <span class="connItem">
                <ion-icon id="mistralStatusIcon" name="sync-outline" class="connIcon connUnknown"></ion-icon>
                Mistral <span id="mistralStatusLabel" class="statusLabel">checking…</span>
              </span>
            </div>
          </section>
        </aside>
      </section>
    </main>
    <script type="module" src="/vendor/ionicons/ionicons.esm.js"></script>
    <script nomodule src="/vendor/ionicons/ionicons.js"></script>
    <script>
      if ("EventSource" in window) {
        const liveReload = new EventSource("/__live-reload");
        liveReload.addEventListener("reload", () => window.location.reload());
      }
    </script>
    <script src="/app.js"></script>
  </body>
</html>
